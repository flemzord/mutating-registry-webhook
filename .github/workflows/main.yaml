name: Main CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dirty:
    name: Check Dirty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Env
        uses: ./.github/actions/default

      - name: Run pre-commit checks
        run: >
          nix develop --command make pre-commit

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected. Please run 'make pre-commit' and commit the changes."
            git diff
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Env
        uses: ./.github/actions/default

      - name: Run tests
        run: >
          nix develop --command make test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./cover.out

  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Env
        uses: ./.github/actions/default

      - name: Install Kubebuilder
        run: |
          nix develop --command bash -c '
            curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
            chmod +x kubebuilder && sudo mv kubebuilder /usr/local/bin/
          '

      - name: Generate Helm chart
        run: >
          nix develop --command kubebuilder edit --plugins=helm/v2-alpha

      - name: Lint Helm chart
        run: >
          nix develop --command helm lint dist/chart

      - name: Template Helm chart
        run: >
          nix develop --command helm template test dist/chart

  e2e-kind:
    name: E2E Tests (Kind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Env
        uses: ./.github/actions/default

      - name: Run E2E tests
        run: >
          nix develop --command make test-e2e

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Controller logs ==="
          kubectl logs -n mutating-registry-webhook-system deployment/mutating-registry-webhook-controller-manager || true
          echo "=== Events ==="
          kubectl get events --all-namespaces --sort-by='.lastTimestamp' || true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
