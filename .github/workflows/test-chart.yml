name: Test Chart

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-chart:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Env
        uses: ./.github/actions/default

      - name: Install Kubebuilder
        run: |
          nix develop --command bash -c '
            curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
            chmod +x kubebuilder && sudo mv kubebuilder /usr/local/bin/
          '

      - name: Generate Helm chart
        run: >
          nix develop --command kubebuilder edit --plugins=helm/v2-alpha

      - name: Lint Helm Chart
        run: >
          nix develop --command helm lint ./dist/chart

      - name: Template Helm chart
        run: >
          nix develop --command helm template test ./dist/chart

      - name: Create kind cluster
        run: >
          nix develop --command kind create cluster

      - name: Build and load Docker image
        run: |
          nix develop --command make docker-build IMG=controller:latest
          nix develop --command kind load docker-image controller:latest

      - name: Install cert-manager
        run: |
          nix develop --command bash -c '
            helm repo add jetstack https://charts.jetstack.io
            helm repo update
            helm install cert-manager jetstack/cert-manager \
              --namespace cert-manager \
              --create-namespace \
              --set crds.enabled=true \
              --wait \
              --timeout 300s
          '

      - name: Deploy manager via Helm
        run: >
          nix develop --command make helm-deploy IMG=controller:latest

      - name: Check Helm release status
        run: >
          nix develop --command make helm-status
